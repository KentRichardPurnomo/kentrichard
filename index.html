    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, useScroll, useTransform, AnimatePresence } = window.Motion;
        
        const ContactButton = ({ text = "Contact Me", href = "#" }) => (
            <a href={href} className="inline-block rounded-full px-8 py-3 sm:px-10 sm:py-3.5 md:px-12 md:py-4 text-xs sm:text-sm md:text-base text-white font-medium uppercase tracking-widest outline outline-2 outline-white outline-offset-[-3px] transition-transform hover:scale-105 active:scale-95"
                style={{
                    background: 'linear-gradient(123deg, #18011F 7%, #B600A8 37%, #7621B0 72%, #BE4C00 100%)',
                    boxShadow: '0px 4px 4px rgba(181, 1, 167, 0.25), inset 4px 4px 12px #7721B1'
                }}>
                {text}
            </a>
        );

        const FadeIn = ({ children, delay = 0, duration = 0.7, x = 0, y = 30, className = "" }) => {
            return (
                <motion.div
                    initial={{ opacity: 0, x, y }}
                    whileInView={{ opacity: 1, x: 0, y: 0 }}
                    viewport={{ once: true, margin: "50px", amount: 0 }}
                    transition={{ duration, delay, ease: [0.25, 0.1, 0.25, 1] }}
                    className={className}
                >
                    {children}
                </motion.div>
            );
        };

        const Magnet = ({ children, padding = 150, strength = 3, className = "" }) => {
            const containerRef = useRef(null);
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [isActive, setIsActive] = useState(false);

            const handleMouseMove = (e) => {
                if (!containerRef.current) return;
                const { left, top, width, height } = containerRef.current.getBoundingClientRect();
                const centerX = left + width / 2;
                const centerY = top + height / 2;
                const distanceX = e.clientX - centerX;
                const distanceY = e.clientY - centerY;
                
                if (Math.abs(distanceX) < width / 2 + padding && Math.abs(distanceY) < height / 2 + padding) {
                    setIsActive(true);
                    setPosition({ x: distanceX / strength, y: distanceY / strength });
                } else {
                    setIsActive(false);
                    setPosition({ x: 0, y: 0 });
                }
            };

            const handleMouseLeave = () => {
                setIsActive(false);
                setPosition({ x: 0, y: 0 });
            };

            return (
                <div ref={containerRef} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave} className={className}>
                    <div style={{
                        transform: `translate3d(${position.x}px, ${position.y}px, 0)`,
                        transition: isActive ? "transform 0.3s ease-out" : "transform 0.6s ease-in-out",
                        willChange: 'transform'
                    }}>
                        {children}
                    </div>
                </div>
            );
        };

        const AnimatedText = ({ text, className }) => {
            const elementRef = useRef(null);
            const { scrollYProgress } = useScroll({
                target: elementRef,
                offset: ['start 0.8', 'end 0.2']
            });

            const words = text.split(" ");
            
            return (
                <p ref={elementRef} className={className}>
                    {words.map((word, i) => (
                        <span key={i} className="relative inline-block mr-1 lg:mr-2">
                            {word.split("").map((char, j) => {
                                const start = (i * word.length + j) / (text.length * 1.5);
                                const end = start + 0.1;
                                const opacity = useTransform(scrollYProgress, [start, end], [0.2, 1]);
                                return (
                                    <span key={j} className="relative inline-block">
                                        <span className="invisible">{char}</span>
                                        <motion.span className="absolute left-0 top-0" style={{ opacity }}>{char}</motion.span>
                                    </span>
                                );
                            })}
                        </span>
                    ))}
                </p>
            );
        };
        const HeroSection = () => {
            return (

                        </FadeIn>

                                </div>

                        </FadeIn>

                        </FadeIn>
                    </div>
                    
                </section>
            );
        };

        const AchievementsSection = () => {
            const sliderRef = useRef(null);
            const [isDown, setIsDown] = useState(false);
            const [startX, setStartX] = useState(0);
            const [scrollLeft, setScrollLeft] = useState(0);

            const handleMouseDown = (e) => {
                setIsDown(true);
                setStartX(e.pageX - sliderRef.current.offsetLeft);
                setScrollLeft(sliderRef.current.scrollLeft);
            };
            const handleMouseLeave = () => setIsDown(false);

            const handleMouseMove = (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - sliderRef.current.offsetLeft;

                                <img src={img} alt={`Achievement ${i}`} className="w-full h-full object-contain p-2 transition-transform duration-500 group-hover:scale-105 pointer-events-none" 
                                     onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                                <div style={{display:'none'}} className="w-full h-full flex flex-col items-center justify-center text-[#aaa] bg-[#111] pointer-events-none">
                                    <i className="bi bi-patch-check text-5xl mb-2"></i>
                                    <span className="text-sm font-medium tracking-widest uppercase">Certificate {i}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

                    </FadeIn>

                        <img src="https://shrug-person-78902957.figma.site/_components/v2/ebb2b8f25d8e24d5f0a5ca8af4c950de81aa2fd7/lego_icon-1.703bb594.png" alt="Lego" />
                    </FadeIn>
                    <FadeIn delay={0.3} x={80} y={0} duration={0.9} className="absolute bottom-[8%] right-[3%] sm:right-[6%] md:right-[10%] w-[110px] sm:w-[150px] md:w-[200px] pointer-events-none opacity-50 sm:opacity-100">

                        </FadeIn>

                            />
                        </div>
                    </div>
                </section>
            );
        };

        const SkillsSection = () => {

                { num: "02", title: "Backend Web", desc: "PHP, Laravel, C, Java, MySQL, Firebase" },
                { num: "03", title: "Mobile App", desc: "Flutter, Dart - Building cross-platform mobile experiences" },
                { num: "04", title: "Data & ML", desc: "Python, Jupyter Notebook, Scikit-Learn - Dragon Fruit Ripeness Prediction" },
                { num: "05", title: "Design & Tools", desc: "Figma (UI/UX), Canva, Git, GitHub, Automation (n8n)" }

            return (
                <section id="skills" className="bg-white rounded-t-[40px] sm:rounded-t-[50px] md:rounded-t-[60px] px-5 sm:px-8 md:px-10 py-20 sm:py-24 md:py-32 relative z-20">
                    <h2 className="text-[#0C0C0C] font-black uppercase text-center mb-16 sm:mb-20 md:mb-28 text-[clamp(3rem,12vw,160px)] leading-none">
                        Skills
                    </h2>

                    <div className="max-w-5xl mx-auto flex flex-col">
                        {skills.map((svc, i) => (
                            <FadeIn key={svc.num} delay={i * 0.1} y={30} className="border-b border-[rgba(12,12,12,0.15)] last:border-0 py-8 sm:py-10 md:py-12 flex flex-col md:flex-row md:items-center gap-6 md:gap-12 group cursor-default">
                                <span className="text-[#0C0C0C] font-black text-[clamp(3rem,10vw,140px)] leading-none md:w-1/3 transition-colors group-hover:text-[#B600A8]">
                                    {svc.num}
                                </span>
                                <div className="md:w-2/3 flex flex-col gap-2">
                                    <h3 className="text-[#0C0C0C] font-medium uppercase text-[clamp(1rem,2.2vw,2.1rem)]">
                                        {svc.title}
                                    </h3>
                                    <p className="text-[#0C0C0C] font-light leading-relaxed max-w-2xl text-[clamp(0.85rem,1.6vw,1.25rem)] opacity-60">
                                        {svc.desc}

                                </div>
                            </FadeIn>
                        ))}
                    </div>

            );
        };

        const ProjectCard = ({ project, index, totalCards }) => {
            const targetScale = 1 - (totalCards - 1 - index) * 0.03;
            
            return (
                <div className="sticky top-24 md:top-32 h-[85vh] flex items-center justify-center w-full" style={{ marginTop: `${index * 28}px` }}>
                    <motion.div 
                        initial={{ scale: 1 }}
                        whileInView={{ scale: targetScale }}
                        viewport={{ margin: "-200px" }}
                        transition={{ duration: 0.5 }}
                        className="w-full h-full max-w-6xl mx-auto rounded-[40px] sm:rounded-[50px] md:rounded-[60px] border-2 border-[#D7E2EA] bg-[#0C0C0C] p-6 sm:p-8 md:p-10 flex flex-col"
                    >
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                            <div className="flex items-center gap-4 sm:gap-6">
                                <span className="font-black text-[clamp(2.5rem,6vw,80px)] text-[#D7E2EA] leading-none">{project.num}</span>
                                <div className="flex flex-col">
                                    <span className="text-[#B600A8] uppercase tracking-widest text-xs font-bold">{project.category}</span>
                                    <h3 className="text-[#D7E2EA] font-medium text-xl sm:text-3xl">{project.title}</h3>
                                </div>
                            </div>
                            <a href={project.link} target="_blank" className="rounded-full border border-[#D7E2EA] text-[#D7E2EA] font-medium uppercase tracking-widest px-6 py-3 text-xs sm:text-sm hover:bg-[#D7E2EA] hover:text-[#0C0C0C] transition-colors whitespace-nowrap">

                            </a>

                        <div className="mb-6">

        const ProjectsSection = () => {
